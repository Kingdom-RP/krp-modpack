# Сторона модов: client / server / both.
#
# Сборщик (krp-launcher/builder --sides) сопоставляет ИМЯ jar в Release с этими
# списками по ПОДСТРОКЕ (slug мода, без версии — устойчиво к смене версии) и
# проставляет каждому файлу `side` в manifest.json:
#   * client — качает только лаунчер (игроку);
#   * server — качает только будущий серверный синк;
#   * both   — и туда, и туда (ПОВЕДЕНИЕ ПО УМОЛЧАНИЮ для всего, что не указано).
#
# Сейчас оба списка пустые → ВСЕ моды = both (как и было). Заполни по мере надобности.
# Один мод не должен быть одновременно в client и server (сборщик упадёт с ошибкой).

# Только клиент (рендер, GUI, звук, инпут — на сервере бесполезны):
client = [
