# modlist.toml — сторонние моды модпака Kingdom RP.
#
# jar'ы лежат в Releases этого репо (тег v1), в git их нет. Сборщик лаунчера
# (krp-launcher/builder --modlist) качает каждый, сверяет/считает SHA-256 и пишет
# в manifest.json внешний url. Формат и нюансы — docs/modlist.example.toml лаунчера.
#
# url-энкодинг: в `file` имя как есть, в `url` спецсимволы экранируй (+ → %2B).
# sha256: пусто → сборщик вычислит сам; заполнено → сверит (защита от подмены).

# --- Пробный набор для проверки пайплайна ---

# EMI — просмотр рецептов/лута. Самодостаточный, без хард-зависимостей.
[[mod]]
file   = "emi-1.1.24+1.21.1+neoforge.jar"
url    = "https://github.com/Kingdom-RP/krp-modpack/releases/download/v1/emi-1.1.24%2B1.21.1%2Bneoforge.jar"
sha256 = ""

# Lithium — оптимизация тиков сервера. Самодостаточный.
[[mod]]
file   = "lithium-neoforge-0.15.3+mc1.21.1.jar"
url    = "https://github.com/Kingdom-RP/krp-modpack/releases/download/v1/lithium-neoforge-0.15.3%2Bmc1.21.1.jar"
sha256 = ""
